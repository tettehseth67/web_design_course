<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log Manual Transaction Receipt</title>

    <!-- Typography Pre-connections -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- Core Bootstrap Framework and Custom Style Tokens -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Premium Isolated Administrative Header Bar (No Public Links) -->
    <nav class="navbar navbar-dark bg-dark sticky-top shadow-sm py-2" role="navigation"
        aria-label="Management Console Header">
        <div class="container-fluid px-4">

            <!-- Logo Branding Node -->
            <a class="navbar-brand fw-bold text-uppercase tracking-wider small d-flex align-items-center gap-2"
                href="/admin/" aria-label="SDTWC Administration Console Home">
                <span class="border-start border-3 border-warning ps-2">SDTWC Console</span>
                <span class="badge bg-secondary text-uppercase admin-metric-label" aria-hidden="true">System
                    Control</span>
            </a>

            <!-- Inside src/_includes/admin-base.html navbar controls menu -->
            <div class="d-flex align-items-center gap-3">
                <!-- FIXED: Data attributes natively wire this button to open the inbox modal overlay -->
                <button type="button" class="btn btn-outline-light btn-sm rounded-0 position-relative fw-semibold px-3"
                    data-bs-toggle="modal" data-bs-target="#adminInboxModal"
                    aria-label="Open Secretariat Inbox, 99 plus unread dispatches">
                    <span>📬 Inbox</span>
                    <span
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-dark admin-metric-label">
                        99+
                        <span class="visually-hidden">unread dispatches</span>
                    </span>
                </button>

                <a href="/" class="btn btn-outline-light btn-sm rounded-0 fw-semibold px-3">
                    Exit Console
                </a>

            </div>


        </div>
    </nav>

    <!-- Core Main Content Workspace Viewport Injection Mount -->
    <main role="main" aria-label="Console Workspace">
        
<!-- Financial Entry Workspace Component -->
<section class="py-5 bg-white error-viewport-height">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-7">

                <!-- Section Header Segment -->
                <div class="text-center mb-4">
                    <a href="/admin/financial-registry/" class="btn btn-outline-charcoal btn-sm mb-3 fw-semibold">&larr;
                        Return to Financial Ledger</a>
                    <span class="text-uppercase tracking-wider fw-bold text-gold small d-block mb-1">Treasury
                        Provisioning Node</span>
                    <h1 class="fw-bold text-charcoal h3 mb-2">Log Contribution Receipt</h1>
                    <p class="text-muted small max-w-md mx-auto">Manually record incoming tithes or special covenants to
                        initialize a new verified transaction record under the corporate treasury framework.</p>
                </div>

                <!-- Static Input Entry Block Wrapper (Completely Inline-CSS Free) -->
                <div class="p-4 border shadow-sm bg-light">
                    <form action="/admin/financial-registry/" method="GET">

                        <!-- Contributor Name Field -->
                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-muted">Contributor Reference / Member
                                ID</label>
                            <input type="text" class="form-control rounded-0"
                                placeholder="e.g., Diaspora Account Member" autofocus required>
                        </div>

                        <!-- Source Location and Allocation Fields -->
                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <label class="form-label small fw-semibold text-muted">Regional Assembly Source</label>
                                <select class="form-select rounded-0" required>
                                    <option value="" disabled selected>Choose location...</option>
                                    <option value="hq">Shalom Otiakrom Headquarters</option>
                                    <option value="accra">Accra Metropolitan Assembly</option>
                                    <option value="london">London Convocation Hub</option>
                                </select>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label small fw-semibold text-muted">Allocation Category</label>
                                <select class="form-select rounded-0" required>
                                    <option value="" disabled selected>Choose fund track...</option>
                                    <option value="tithe">Annual Festival Tithe Allocation</option>
                                    <option value="building">Headquarters Infrastructure Fund</option>
                                    <option value="welfare">Healthcare Welfare Contribution</option>
                                </select>
                            </div>
                        </div>

                        <!-- Amount and Custom Currency Reference -->
                        <div class="row g-3 mb-4">
                            <div class="col-sm-6">
                                <label class="form-label small fw-semibold text-muted">Transaction Amount</label>
                                <input type="number" class="form-control rounded-0" placeholder="0.00" step="0.01"
                                    min="0.01" required>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label small fw-semibold text-muted">Assigned Ledger Code
                                    Tracking</label>
                                <input type="text" class="form-control rounded-0 font-monospace"
                                    placeholder="Automatically generated..." disabled>
                            </div>
                        </div>

                        <!-- Execution Submission Button -->
                        <button type="submit" class="btn btn-charcoal w-100 fw-semibold rounded-0 py-2.5">Commit
                            Transaction &amp; Save</button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</section>
    </main>

    <!-- Framework Execution Pipeline (Completely Free of Public Footers) -->
    <script src="/js/bootstrap.bundle.min.js"></script>
</body>

</html>
