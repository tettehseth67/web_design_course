<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Console Access Authentication | SDTWC Control Gate</title>

    <!-- Typography Pre-connections -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">

    <!-- Core Bootstrap Framework and Custom Style Tokens -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100 justify-content-center">

    <!-- Main Content Workspace Injected Here Directly (No Headers, No Footers) -->
    <main>
        
<!-- Admin Security Gateway Section -->
<section class="py-5 bg-white d-flex align-items-center flex-grow-1 error-viewport-height">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">

                <!-- Branding & Header Section -->
                <div class="text-center mb-4">
                    <span class="text-uppercase fw-bold text-danger small d-block mb-1 admin-metric-label">Security
                        Protocol Node</span>
                    <h1 class="fw-bold text-charcoal h3 mb-2">Console Authentication</h1>
                    <p class="text-muted small max-w-sm mx-auto">Authorized personnel must negotiate token authorization
                        credentials to initialize a secure control panel session.</p>
                </div>

                <!-- Clean Traditional HTML Form Panel -->
                <div class="p-4 border shadow-sm bg-light">
                    <form action="/admin/" method="GET">

                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-muted">Administrative Token ID</label>
                            <input type="text" class="form-control rounded-0 font-monospace"
                                placeholder="e.g., exec_admin_01" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-semibold text-muted">Secure Security Key</label>
                            <input type="password" class="form-control rounded-0" autocomplete="new-password" placeholder="••••••••••••" required>
                        </div>

                        <!-- Form submission routes verified traffic straight into your main admin index -->
                        <button type="submit" class="btn btn-charcoal w-100 fw-semibold rounded-0 py-2.5">Verify &amp;
                            Establish Session</button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</section>
    </main>

    <!-- Framework Execution Pipeline -->
    <script src="/js/bootstrap.bundle.min.js"></script>
</body>

</html>
