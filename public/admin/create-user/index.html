<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register New Congregant Profile | SDTWC Management Console</title>

    <!-- Typography Pre-connections -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link
        href="https://googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- Core Bootstrap Framework and Custom Style Tokens -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Premium Isolated Administrative Header Bar (No Public Links) -->
    <nav class="navbar navbar-dark bg-dark sticky-top shadow-sm py-2">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-uppercase tracking-wider small d-flex align-items-center gap-2"
                href="/admin/">
                <span class="border-start border-3 border-warning ps-2">SDTWC Console</span>
                <span class="badge bg-secondary text-uppercase admin-metric-label">System Control</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white-50 small font-monospace d-none d-sm-inline">Node: Exec-01</span>
                <a href="/" class="btn btn-outline-light btn-sm rounded-0 fw-semibold">Exit Console</a>
            </div>
        </div>
    </nav>

    <!-- Core Main Content Workspace Viewport Injection Mount -->
    <main>
        
<!-- Create User Workspace Component -->
<section class="py-5 bg-white error-viewport-height">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-7">

                <!-- Section Header Segment -->
                <div class="text-center mb-4">
                    <a href="/admin/" class="btn btn-outline-charcoal btn-sm mb-3 fw-semibold">&larr; Return to User
                        Directory</a>
                    <span class="text-uppercase tracking-wider fw-bold text-gold small d-block mb-1">System Provisioning
                        Node</span>
                    <h1 class="fw-bold text-charcoal h3 mb-2">Create Congregant Record</h1>
                    <p class="text-muted small max-w-md mx-auto">Manually input profile metrics to initialize a new
                        verified account under the corporate theocratic charter.</p>
                </div>

                <!-- Static Input Entry Block Wrapper (Completely Inline-CSS Free) -->
                <div class="p-4 border shadow-sm bg-light">
                    <form action="/admin/" method="GET">

                        <!-- Account Name Row Split -->
                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <label class="form-label small fw-semibold text-muted">First Name / Given</label>
                                <input type="text" class="form-control rounded-0" placeholder="John" required>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label small fw-semibold text-muted">Surname / Family</label>
                                <input type="text" class="form-control rounded-0" placeholder="Doe" required>
                            </div>
                        </div>


                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-muted">Official Email Address</label>
                            <input type="email" class="form-control rounded-0" placeholder="name@example.com" required>
                        </div>

                        <!-- Group and Clearance Classifications -->
                        <div class="row g-3 mb-4">
                            <div class="col-sm-6">
                                <label class="form-label small fw-semibold text-muted">Group Unit Assignment</label>
                                <select class="form-select rounded-0" required>
                                    <option value="" disabled selected>Choose group...</option>
                                    <option value="exec">Executive Central Board</option>
                                    <option value="hospital">Healing Directorate</option>
                                    <option value="youth">Theocratic Youth Council</option>
                                    <option value="women">Virtuous Women Fellowship</option>
                                    <option value="guilds">Vocational Skill Guilds</option>
                                </select>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label small fw-semibold text-muted">System Security Clearance</label>
                                <select class="form-select rounded-0" required>
                                    <option value="" disabled selected>Choose clearance...</option>
                                    <option value="standard">Standard Member Access</option>
                                    <option value="root">Root Executive Controls</option>
                                </select>
                            </div>
                        </div>

                        <!-- Execution Submission Button -->
                        <button type="submit" class="btn btn-charcoal w-100 fw-semibold rounded-0 py-2.5">Provision
                            Account &amp; Save</button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</section>
    </main>

    <!-- Framework Execution Pipeline (Completely Free of Public Footers) -->
    <script src="/js/bootstrap.bundle.min.js"></script>
</body>

</html>
