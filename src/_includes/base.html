<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Shortened, Concise SEO Title Strategy -->
    <title>{% if title %}{{ title }} | SDTWC{% else %}SDTWC{% endif %}</title>

    <!-- Dynamic Search Engine Meta Descriptions -->
    <meta name="description"
        content="{% if description %}{{ description }}{% else %}Official portal of the Seventh-Day Theocratic World Congregation (SDTWC), preserving the foundational Mount Sinai Covenant and original biblical time structures.{% endif %}">

    <!-- Open Graph / Facebook Social Previews -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% if title %}{{ title }} | SDTWC{% else %}SDTWC World Congregation{% endif %}">
    <meta property="og:description"
        content="{% if description %}{{ description }}{% else %}Preserving the foundational Mount Sinai Covenant and walking in authentic Judeo-Christian philosophy.{% endif %}">
    <meta property="og:url" content="https://seventhdaytheocraticworld.org{{ page.url }}">

    <!-- Core Branding Favicon Icon Suite -->
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png">

    <!-- Typography Asset Pre-connections -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- Theme Stylesheet Chain -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>


<body class="d-flex flex-column min-vh-100">

    <!-- Injects your shared navigation bar menu -->
    {% include "navigation.html" %}

    <!-- Injects your page-specific text content modules -->
    <main class="flex-grow-1">
        {{ content | safe }}
    </main>

    <!-- Injects your shared organizational footer -->
    {% include "footer.html" %}

    <!-- Bootstrap Javascript Bundle -->
    <script src="/js/bootstrap.bundle.min.js"></script>

    <script>
        if (globalThis.netlifyIdentity) {
            globalThis.netlifyIdentity.on("init", function (user) {
                if (!user) {
                    globalThis.netlifyIdentity.on("login", function () {
                        document.location.href = "/"; // Route to homepage or custom dashboard on login
                    });
                }
            });
        }
    </script>

</body>

</html>
