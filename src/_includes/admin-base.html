<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} | SDTWC Management Console</title>

    <!-- Typography Pre-connections -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- Core Bootstrap Framework and Custom Style Tokens -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Premium Isolated Administrative Header Bar (No Public Links) -->
    <nav class="navbar navbar-dark bg-dark sticky-top shadow-sm py-2">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-uppercase tracking-wider small d-flex align-items-center gap-2"
                href="/admin/">
                <span class="border-start border-3 border-warning ps-2">SDTWC Console</span>
                <span class="badge bg-secondary text-uppercase admin-metric-label">System Control</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white-50 small font-monospace d-none d-sm-inline">Node: Exec-01</span>
                <a href="/" class="btn btn-outline-light btn-sm rounded-0 fw-semibold">Exit Console</a>
            </div>
        </div>
    </nav>

    <!-- Core Main Content Workspace Viewport Injection Mount -->
    <main>
        {{ content | safe }}
    </main>

    <!-- Framework Execution Pipeline (Completely Free of Public Footers) -->
    <script src="/js/bootstrap.bundle.min.js"></script>
</body>

</html>
